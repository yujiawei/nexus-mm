version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: nexus
      POSTGRES_PASSWORD: nexus
      POSTGRES_DB: nexus_mm
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nexus -d nexus_mm"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  wukongim:
    image: registry.cn-shanghai.aliyuncs.com/wukongim/wukongim:v2.1
    ports:
      - "5001:5001"  # API
      - "5100:5100"  # TCP
      - "5200:5200"  # WebSocket
      - "5300:5300"  # Manager
    environment:
      WK_MODE: debug
    volumes:
      - wkdata:/root/wukongim

  meilisearch:
    image: getmeili/meilisearch:v1.6
    ports:
      - "7700:7700"
    environment:
      MEILI_ENV: development
    volumes:
      - msdata:/meili_data

volumes:
  pgdata:
  wkdata:
  msdata:
